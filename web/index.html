<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Viewer</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #2a2a2a;
    --panel-2: #333;
    --text: #e8e8e8;
    --muted: #9a9a9a;
    --accent: #4a9eff;
    --border: #3a3a3a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; }

  #drop-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(74, 158, 255, 0.15);
    border: 3px dashed var(--accent);
    z-index: 50;
    pointer-events: none;
    font-size: 24px;
  }
  #drop-overlay.active { display: flex; }

  #panel {
    position: fixed; top: 12px; right: 12px;
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    font-size: 13px;
    max-height: calc(100vh - 24px);
    overflow-y: auto;
  }
  #panel h2 {
    margin: 0 0 8px 0; font-size: 14px; font-weight: 600;
    color: var(--text);
  }
  #panel h3 {
    margin: 14px 0 6px 0; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted);
  }
  .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .row label { flex: 1; color: var(--muted); }
  .row input[type="range"] { flex: 1; }
  .row input[type="checkbox"] { accent-color: var(--accent); }
  select, button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font: inherit; cursor: pointer;
  }
  select { width: 100%; }
  button { width: 100%; margin-top: 4px; }
  button:hover { background: #404040; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover { background: #3a8eef; }

  #info {
    position: fixed; bottom: 12px; left: 12px;
    background: rgba(42,42,42,0.85);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    z-index: 10;
    font-size: 12px;
    color: var(--muted);
    max-width: 360px;
    backdrop-filter: blur(6px);
  }
  #info strong { color: var(--text); }
  #empty-hint {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    color: var(--muted);
    font-size: 18px;
    text-align: center;
  }
  #empty-hint.hidden { display: none; }
  #empty-hint .sub { font-size: 13px; margin-top: 8px; opacity: 0.7; }

  #busy {
    position: fixed; top: 12px; left: 12px;
    background: rgba(42,42,42,0.95);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: 10px 16px;
    z-index: 100;
    display: none;
    align-items: center; gap: 10px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #busy.active { display: flex; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .file-input { display: none; }
  .stats { color: var(--muted); font-size: 11px; }

  /* Recent files list */
  #recents {
    display: flex; flex-direction: column;
    gap: 2px;
    margin: 4px 0;
  }
  .recent-item {
    width: 100%; margin: 0;
    text-align: left;
    background: transparent; border: 1px solid transparent;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
  }
  .recent-item:hover { background: var(--panel-2); border-color: var(--border); }
  .recent-item .r-name {
    color: var(--text);
    font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .recent-item .r-path {
    color: var(--muted);
    font-size: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .recents-empty {
    color: var(--muted);
    font-size: 11px;
    padding: 4px 8px;
    font-style: italic;
  }
  .recents-actions {
    display: flex; gap: 6px; margin-top: 2px;
  }
  .recents-actions button {
    flex: 1; margin: 0;
    font-size: 11px;
    padding: 3px 6px;
  }

  /* Generate modal */
  #gen-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  #gen-modal.active { display: flex; }
  #gen-modal .dialog {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: min(820px, 95vw);
    max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
  }
  #gen-modal header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  #gen-modal header h2 { margin: 0; font-size: 16px; }
  #gen-modal .close-btn {
    background: none; border: none; color: var(--muted);
    font-size: 22px; cursor: pointer; padding: 0; width: auto;
    line-height: 1;
  }
  #gen-modal .close-btn:hover { color: var(--text); }
  #gen-modal .body {
    padding: 14px 18px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  #gen-modal .body label.field {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-top: 4px;
  }
  #scad-prompt {
    width: 100%; padding: 8px 10px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    font: inherit; resize: vertical; min-height: 56px;
  }
  #scad-editor {
    width: 100%; min-height: 280px; max-height: 50vh;
    padding: 10px;
    background: #181818; color: #e0e0e0;
    border: 1px solid var(--border); border-radius: 4px;
    font: 13px/1.45 "Cascadia Mono", Consolas, "Courier New", monospace;
    resize: vertical;
    tab-size: 4;
  }
  #scad-status {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    background: #1c1c1c;
    border: 1px solid var(--border);
    color: var(--muted);
    min-height: 16px;
    white-space: pre-wrap;
    font-family: "Cascadia Mono", Consolas, monospace;
    max-height: 120px;
    overflow-y: auto;
  }
  #scad-status.err { color: #ff8b8b; border-color: #5a2a2a; }
  #scad-status.ok { color: #8be58b; border-color: #2a5a2a; }
  #gen-modal .actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  #gen-modal .actions button { width: auto; flex: 1; min-width: 130px; margin: 0; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="empty-hint">
  Drop a 3D file here, or click <strong style="color:var(--accent)">Open File</strong>
  <br><span class="sub">Models: GLB, GLTF, FBX, OBJ, STL, PLY, USDZ, USD/USDA/USDC, STEP, IGES, BREP &middot; Env: HDR, EXR</span>
</div>

<div id="drop-overlay">Drop to load</div>

<div id="busy"><div class="spinner"></div><span id="busy-msg">Loading...</span></div>

<!-- Generate (text-to-3D / parametric) modal -->
<div id="gen-modal">
  <div class="dialog">
    <header>
      <h2>&#10024; Generate 3D (OpenSCAD)</h2>
      <button class="close-btn" id="gen-close" title="Close">&times;</button>
    </header>
    <div class="body">
      <label class="field" for="scad-template">Template</label>
      <select id="scad-template">
        <optgroup label="Primitives">
          <option value="cube">Cube</option>
          <option value="sphere">Sphere</option>
          <option value="cylinder">Cylinder</option>
          <option value="hollow_box">Hollow Box</option>
          <option value="rounded_box">Rounded Box</option>
        </optgroup>
        <optgroup label="Decorative">
          <option value="vase">Vase</option>
          <option value="twisted_vase">Twisted Vase</option>
          <option value="lampshade">Lampshade (with cutouts)</option>
        </optgroup>
        <optgroup label="Mechanical">
          <option value="gear">Spur Gear</option>
          <option value="hex_nut">Hex Nut (M10)</option>
          <option value="coil_spring">Helical Spring</option>
          <option value="bracket">L-Bracket (with holes)</option>
          <option value="knob">Knurled Knob</option>
        </optgroup>
        <optgroup label="Practical">
          <option value="phone_stand">Phone Stand</option>
          <option value="coffee_mug">Coffee Mug (with handle)</option>
          <option value="honeycomb">Honeycomb Panel</option>
        </optgroup>
        <optgroup label="Other">
          <option value="blank">Blank</option>
        </optgroup>
      </select>

      <label class="field" for="scad-prompt">Natural-language description (optional)</label>
      <textarea id="scad-prompt" placeholder="e.g. a 40mm diameter knob with 12 knurls and a 6mm shaft hole"></textarea>

      <label class="field" for="scad-editor">OpenSCAD code</label>
      <textarea id="scad-editor" spellcheck="false"></textarea>

      <div id="scad-status">Ready.</div>
    </div>
    <div class="actions">
      <button class="primary" id="scad-render">Render &amp; Load</button>
      <button id="scad-copy-prompt">Copy Claude Prompt</button>
      <button id="scad-save">Save .scad</button>
    </div>
  </div>
</div>

<div id="panel">
  <h2>3D Viewer</h2>

  <button class="primary" id="btn-open">Open File...</button>
  <button id="btn-generate">&#10024; Generate (OpenSCAD)</button>
  <input type="file" class="file-input" id="file-input"
         accept=".glb,.gltf,.fbx,.obj,.stl,.ply,.usdz,.usd,.usda,.usdc,.step,.stp,.iges,.igs,.brep,.hdr,.exr" multiple>

  <h3 id="recents-header" style="display:none">Recent</h3>
  <div id="recents" style="display:none"></div>
  <div class="recents-actions" id="recents-actions" style="display:none">
    <button id="btn-clear-recents" title="Clear recent files list">Clear Recent</button>
  </div>

  <h3>Environment</h3>
  <div class="row">
    <label>Preset</label>
  </div>
  <select id="env-preset">
    <option value="studio">Studio (procedural)</option>
    <option value="warehouse">Warehouse (procedural)</option>
    <option value="sunset">Sunset (procedural)</option>
    <option value="neutral">Neutral grey</option>
    <option value="black">Black</option>
  </select>
  <button id="btn-load-hdr">Load HDR/EXR...</button>

  <div class="row">
    <label>Show background</label>
    <input type="checkbox" id="show-bg" checked>
  </div>
  <div class="row">
    <label>Intensity</label>
    <input type="range" id="env-intensity" min="0" max="3" step="0.05" value="1">
  </div>
  <div class="row">
    <label>Rotation</label>
    <input type="range" id="env-rotation" min="0" max="360" step="1" value="0">
  </div>

  <h3>Display</h3>
  <div class="row">
    <label>Wireframe</label>
    <input type="checkbox" id="wireframe">
  </div>
  <div class="row">
    <label>Grid</label>
    <input type="checkbox" id="show-grid" checked>
  </div>
  <div class="row">
    <label>Auto-rotate</label>
    <input type="checkbox" id="auto-rotate">
  </div>
  <div class="row">
    <label>Tone mapping</label>
  </div>
  <select id="tone-mapping">
    <option value="ACESFilmic" selected>ACES Filmic</option>
    <option value="Neutral">Neutral</option>
    <option value="Reinhard">Reinhard</option>
    <option value="Linear">Linear</option>
    <option value="None">None</option>
  </select>
  <div class="row">
    <label>Exposure</label>
    <input type="range" id="exposure" min="0" max="3" step="0.05" value="1">
  </div>

  <h3>Camera</h3>
  <button id="btn-frame">Frame Object</button>
  <button id="btn-reset-cam">Reset View</button>

  <h3>Export</h3>
  <button id="btn-screenshot">Save Screenshot (PNG)</button>
</div>

<div id="info">
  <div id="info-name"><strong>No model loaded</strong></div>
  <div id="info-stats" class="stats"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "./vendor/three/build/three.module.js",
    "three/addons/": "./vendor/three/examples/jsm/"
  }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { USDZLoader } from 'three/addons/loaders/USDZLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EXRLoader } from 'three/addons/loaders/EXRLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { zipSync, strToU8 } from 'three/addons/libs/fflate.module.js';

// ---------- Scene setup ----------
const canvasWrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
canvasWrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 5000);
camera.position.set(3, 2, 4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Grid + axes helpers
const grid = new THREE.GridHelper(10, 20, 0x444444, 0x333333);
grid.material.transparent = true;
grid.material.opacity = 0.6;
scene.add(grid);

// Lights for fallback (when env is "neutral" or "black")
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(5, 10, 7);
scene.add(ambient);
scene.add(dir);

// Current loaded object
let currentObject = null;
let currentEnvTexture = null;
let envSource = null; // raw equirect texture for rotation/background
let backgroundEnabled = true;

// ---------- Loaders ----------
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('./vendor/three/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);
const fbxLoader = new FBXLoader();
const objLoader = new OBJLoader();
const stlLoader = new STLLoader();
const plyLoader = new PLYLoader();
const usdzLoader = new USDZLoader();
const rgbeLoader = new RGBELoader();
const exrLoader = new EXRLoader();

// ---------- Busy indicator ----------
const busyEl = document.getElementById('busy');
const busyMsgEl = document.getElementById('busy-msg');
function busy(msg) { busyMsgEl.textContent = msg; busyEl.classList.add('active'); }
function unbusy() { busyEl.classList.remove('active'); }

// ---------- OCCT (lazy-loaded for STEP/IGES/BREP) ----------
let occtPromise = null;
function getOcct() {
  if (occtPromise) return occtPromise;
  occtPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/occt-import-js@0.0.22/dist/occt-import-js.js';
    script.onload = () => {
      if (typeof occtimportjs !== 'function') {
        reject(new Error('occt-import-js global not found after script load'));
        return;
      }
      // Tell emscripten where to find the .wasm
      occtimportjs({
        locateFile: (path) => `https://cdn.jsdelivr.net/npm/occt-import-js@0.0.22/dist/${path}`
      }).then(resolve, reject);
    };
    script.onerror = () => reject(new Error('Failed to load occt-import-js from CDN'));
    document.head.appendChild(script);
  });
  return occtPromise;
}

async function loadCadFile(file, ext) {
  busy(`Parsing ${ext.toUpperCase()} via OpenCascade...`);
  try {
    const occt = await getOcct();
    const buf = new Uint8Array(await file.arrayBuffer());
    let result;
    const params = null;
    if (ext === 'step' || ext === 'stp') result = occt.ReadStepFile(buf, params);
    else if (ext === 'iges' || ext === 'igs') result = occt.ReadIgesFile(buf, params);
    else if (ext === 'brep') result = occt.ReadBrepFile(buf, params);
    else throw new Error(`Unhandled CAD extension: ${ext}`);

    if (!result || !result.success) {
      throw new Error(`OpenCascade could not parse this ${ext.toUpperCase()} file`);
    }

    const group = new THREE.Group();
    for (const meshData of result.meshes) {
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(meshData.attributes.position.array);
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      if (meshData.attributes.normal) {
        const norm = new Float32Array(meshData.attributes.normal.array);
        geo.setAttribute('normal', new THREE.BufferAttribute(norm, 3));
      } else {
        geo.computeVertexNormals();
      }
      if (meshData.index) {
        const Ctor = meshData.index.array.length > 0 && (Math.max(...meshData.index.array.slice(0, Math.min(1000, meshData.index.array.length))) > 65535) ? Uint32Array : Uint32Array;
        const idx = new Ctor(meshData.index.array);
        geo.setIndex(new THREE.BufferAttribute(idx, 1));
      }
      let color = new THREE.Color(0xb8b8c0);
      if (meshData.color && meshData.color.length >= 3) {
        color = new THREE.Color(meshData.color[0], meshData.color[1], meshData.color[2]);
      }
      const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.45, metalness: 0.15,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geo, mat);
      if (meshData.name) mesh.name = meshData.name;
      group.add(mesh);
    }
    setObject(group, file.name);
  } catch (err) {
    console.error(err);
    alert(`Failed to load CAD file ${file.name}\n\n${err.message || err}`);
  } finally {
    unbusy();
  }
}

// ---------- Tauri invoke helper ----------
function tauriInvoke() {
  if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
    return window.__TAURI__.core.invoke.bind(window.__TAURI__.core);
  }
  if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) {
    return window.__TAURI_INTERNALS__.invoke.bind(window.__TAURI_INTERNALS__);
  }
  return null;
}

// =====================================================================
// Phase 6: persistent app state — UI settings + recent files
// =====================================================================
const STATE_VERSION = 1;
const MAX_RECENTS   = 10;
const PERSISTED_CONTROLS = [
  // [elementId, type-hint]
  ['env-preset',    'select'],
  ['show-bg',       'checkbox'],
  ['env-intensity', 'range'],
  ['env-rotation',  'range'],
  ['show-grid',     'checkbox'],
  ['tone-mapping',  'select'],
  ['exposure',      'range'],
];

let appState = { v: STATE_VERSION, settings: {}, recents: [] };

async function loadAppState() {
  const invoke = tauriInvoke();
  if (!invoke) return; // plain browser: no persistence
  try {
    const json = await invoke('load_app_state');
    const parsed = JSON.parse(json || '{}');
    if (parsed && typeof parsed === 'object') {
      appState.settings = (parsed.settings && typeof parsed.settings === 'object') ? parsed.settings : {};
      appState.recents  = Array.isArray(parsed.recents) ? parsed.recents : [];
    }
  } catch (e) {
    console.warn('Could not load saved state:', e);
  }
}

let saveTimer = null;
function scheduleSave() {
  const invoke = tauriInvoke();
  if (!invoke) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await invoke('save_app_state', { json: JSON.stringify(appState) });
    } catch (e) {
      console.warn('Could not save state:', e);
    }
  }, 400);
}

function captureSetting(id) {
  const el = document.getElementById(id);
  if (!el) return;
  appState.settings[id] = (el.type === 'checkbox') ? el.checked : el.value;
  scheduleSave();
}

function applyPersistedSettings() {
  for (const [id, type] of PERSISTED_CONTROLS) {
    if (!(id in appState.settings)) continue;
    const el = document.getElementById(id);
    if (!el) continue;
    const v = appState.settings[id];
    if (type === 'checkbox') el.checked = !!v;
    else el.value = v;
    // Fire input + change so the existing handlers actually apply the value to the renderer
    el.dispatchEvent(new Event('input',  { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
  }
}

// ---- Recent files ----
function addRecent(path, name) {
  if (!path) return;
  const entry = { path, name: name || path.split(/[\\/]/).pop(), openedAt: Date.now() };
  appState.recents = [entry]
    .concat(appState.recents.filter(r => r.path !== path))
    .slice(0, MAX_RECENTS);
  renderRecents();
  scheduleSave();
}

function clearRecents() {
  appState.recents = [];
  renderRecents();
  scheduleSave();
}

function shortenPath(p, max = 36) {
  if (!p || p.length <= max) return p || '';
  const head = p.slice(0, 3);
  const tail = p.slice(-(max - head.length - 1));
  return head + '…' + tail;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderRecents() {
  const header = document.getElementById('recents-header');
  const list   = document.getElementById('recents');
  const acts   = document.getElementById('recents-actions');
  if (!header || !list || !acts) return;
  if (appState.recents.length === 0) {
    header.style.display = 'none';
    list.style.display   = 'none';
    acts.style.display   = 'none';
    return;
  }
  header.style.display = '';
  list.style.display   = '';
  acts.style.display   = '';
  list.innerHTML = '';
  for (const r of appState.recents) {
    const el = document.createElement('button');
    el.className = 'recent-item';
    el.title = r.path;
    el.innerHTML =
      '<div class="r-name">' + escapeHtml(r.name) + '</div>' +
      '<div class="r-path">' + escapeHtml(shortenPath(r.path)) + '</div>';
    el.addEventListener('click', () => openByPath(r.path, r.name));
    list.appendChild(el);
  }
}

async function openByPath(path, name) {
  const invoke = tauriInvoke();
  if (!invoke) {
    alert('Reopening files requires the desktop build.');
    return;
  }
  const filename = name || path.split(/[\\/]/).pop();
  busy(`Opening ${filename}...`);
  try {
    const bytes = await invoke('read_file_bytes', { path });
    const file  = new File([new Blob([bytes])], filename);
    loadFile(file);
    addRecent(path, filename);
  } catch (e) {
    console.error(e);
    alert(`Couldn't open ${filename}\n\n${e.message || e}`);
    unbusy();
  }
}

// ---- Tauri OS-level drag-drop listener ----
// Browser drop events give File objects but no path; the Rust side captures
// the OS-level drop and emits `os-drop` with the path strings so we can use
// the read_file_bytes pipeline + record paths in the Recent list.
function setupOsDropListener() {
  const evtApi = window.__TAURI__ && window.__TAURI__.event;
  if (!evtApi || !evtApi.listen) return;
  evtApi.listen('os-drop', async (event) => {
    const paths = Array.isArray(event.payload) ? event.payload : [];
    for (const p of paths) {
      await openByPath(p);
    }
  }).catch(err => console.warn('os-drop subscribe failed:', err));
}

// ---------- USD via usdcat → .glb pipeline (Phase 3.2) ----------
// Three.js's USDA parser is too limited for real scenes. We side-step it
// entirely: Rust shells out to `usdcat --flatten input.usd? -o out.glb`,
// which uses the Pixar usdGltf plugin to produce a proper glTF binary. We
// then feed that .glb through GLTFLoader, which handles every USD feature
// the source file used.
async function loadUsdViaGlbConverter(file, ext) {
  busy(`Converting ${file.name} via usdcat → .glb...`);
  try {
    const invoke = tauriInvoke();
    if (!invoke) {
      throw new Error(
        `.${ext} support requires the desktop build (Tauri) so we can run usdcat. ` +
        `In a plain browser there's no way to invoke a native binary. Either build/run ` +
        `the desktop app, or convert your file to .glb / .usdz externally first.`
      );
    }
    const inputBytes = Array.from(new Uint8Array(await file.arrayBuffer()));
    const glbBuf = await invoke('convert_usd_to_glb', { bytes: inputBytes, sourceExt: ext });

    busy(`Loading converted ${file.name}...`);
    // Pass the .glb bytes through GLTFLoader.parse — handles meshes, UVs,
    // materials, textures embedded in the glb, skinning, etc.
    await new Promise((resolve, reject) => {
      gltfLoader.parse(
        glbBuf,
        '',
        (gltf) => {
          setObject(gltf.scene, file.name);
          resolve();
        },
        (err) => reject(err)
      );
    });
  } catch (err) {
    console.error(err);
    alert(`Couldn't load ${file.name}\n\n${err.message || err}`);
  } finally {
    unbusy();
  }
}

// ---------- USD wrapper (Phase 3) ----------
// Wraps a raw .usd / .usda / .usdc into a USDZ container in memory so we can
// reuse Three.js's USDZLoader. Works for self-contained USD files; files with
// external asset references will fail (those need full USD-wasm support).
async function loadRawUsd(file, ext) {
  busy(`Wrapping ${ext.toUpperCase()} as USDZ...`);
  try {
    const buf = new Uint8Array(await file.arrayBuffer());
    // Strip directory from filename
    const baseName = file.name.replace(/.*[\\\/]/, '');
    // USDZ requires the root file to be aligned. fflate's zipSync with level 0
    // (stored, no compression) creates a USDZ-compatible archive.
    const zipData = zipSync({ [baseName]: [buf, { level: 0 }] });
    // Pass through USDZLoader.parse (it expects a zip ArrayBuffer)
    const obj = usdzLoader.parse(zipData.buffer);
    setObject(obj, file.name);
  } catch (err) {
    console.error(err);
    alert(
      `Couldn't load ${file.name} as USD.\n\n` +
      `${err.message || err}\n\n` +
      `Simple, self-contained USD files work. Files referencing external textures or layers ` +
      `need full Pixar USD support (planned). Workarounds:\n` +
      `  - Re-export as .usdz (single-file)\n` +
      `  - Re-export as .glb`
    );
  } finally {
    unbusy();
  }
}

// ---------- Loading ----------
function clearObject() {
  if (currentObject) {
    scene.remove(currentObject);
    currentObject.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
    currentObject = null;
  }
}

function setObject(obj, fileName) {
  clearObject();
  currentObject = obj;
  scene.add(obj);
  applyWireframe(document.getElementById('wireframe').checked);
  frameObject();
  updateInfo(fileName, obj);
  document.getElementById('empty-hint').classList.add('hidden');
}

function loadFile(file) {
  const url = URL.createObjectURL(file);
  const name = file.name.toLowerCase();
  const ext = name.slice(name.lastIndexOf('.') + 1);

  const onError = (err) => {
    console.error(err);
    alert(`Failed to load ${file.name}\n\n${err.message || err}`);
  };

  switch (ext) {
    case 'glb':
    case 'gltf':
      gltfLoader.load(url, (gltf) => setObject(gltf.scene, file.name), undefined, onError);
      break;
    case 'fbx':
      fbxLoader.load(url, (obj) => setObject(obj, file.name), undefined, onError);
      break;
    case 'obj':
      objLoader.load(url, (obj) => {
        // OBJ has no materials by default; give it a neutral one
        obj.traverse(c => {
          if (c.isMesh && (!c.material || c.material.length === 0)) {
            c.material = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5, metalness: 0 });
          }
        });
        setObject(obj, file.name);
      }, undefined, onError);
      break;
    case 'stl':
      stlLoader.load(url, (geo) => {
        const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.1 });
        const mesh = new THREE.Mesh(geo, mat);
        const group = new THREE.Group();
        group.add(mesh);
        setObject(group, file.name);
      }, undefined, onError);
      break;
    case 'ply':
      plyLoader.load(url, (geo) => {
        geo.computeVertexNormals();
        const hasColors = geo.hasAttribute('color');
        const mat = new THREE.MeshStandardMaterial({
          color: hasColors ? 0xffffff : 0xcccccc,
          vertexColors: hasColors,
          roughness: 0.5
        });
        const mesh = new THREE.Mesh(geo, mat);
        const group = new THREE.Group();
        group.add(mesh);
        setObject(group, file.name);
      }, undefined, onError);
      break;
    case 'usdz':
      usdzLoader.load(url, (obj) => setObject(obj, file.name), undefined, onError);
      break;
    case 'usd':
    case 'usda':
    case 'usdc':
      // If running in Tauri, the robust path is usdcat → .glb → GLTFLoader.
      // If running in a plain browser (no native binary access), fall back to
      // the in-memory USDZ wrap for .usd/.usda (best-effort) or fail clearly for .usdc.
      if (tauriInvoke()) {
        loadUsdViaGlbConverter(file, ext);
      } else if (ext === 'usdc') {
        alert(`.usdc files need the desktop build to convert via usdcat.\nRun this in the Tauri app, or convert to .glb / .usdz externally.`);
      } else {
        loadRawUsd(file, ext);
      }
      break;
    case 'step':
    case 'stp':
    case 'iges':
    case 'igs':
    case 'brep':
      loadCadFile(file, ext);
      break;
    case 'hdr':
      rgbeLoader.load(url, (tex) => setEnvironmentFromTexture(tex, file.name), undefined, onError);
      break;
    case 'exr':
      exrLoader.load(url, (tex) => setEnvironmentFromTexture(tex, file.name), undefined, onError);
      break;
    default:
      alert(`Unsupported file type: .${ext}`);
  }
}

// ---------- Environment ----------
function setEnvironmentFromTexture(tex, label) {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  const envMap = pmremGenerator.fromEquirectangular(tex).texture;
  scene.environment = envMap;
  envSource = tex;
  currentEnvTexture = envMap;
  updateBackground();
  if (label) console.log('Loaded HDR:', label);
}

function setProceduralEnvironment(kind) {
  if (kind === 'black') {
    scene.environment = null;
    envSource = null;
    currentEnvTexture = null;
    scene.background = backgroundEnabled ? new THREE.Color(0x000000) : null;
    return;
  }
  if (kind === 'neutral') {
    scene.environment = null;
    envSource = null;
    currentEnvTexture = null;
    scene.background = backgroundEnabled ? new THREE.Color(0x202020) : null;
    return;
  }
  // Procedural via RoomEnvironment + tinting trick for variety
  const room = new RoomEnvironment();
  const envMap = pmremGenerator.fromScene(room, 0.04).texture;
  scene.environment = envMap;
  currentEnvTexture = envMap;
  envSource = null;
  // background color tints per preset
  const bgs = {
    studio:    0x303030,
    warehouse: 0x252b33,
    sunset:    0x40342a
  };
  scene.background = backgroundEnabled ? new THREE.Color(bgs[kind] ?? 0x303030) : null;
}

function updateBackground() {
  if (!backgroundEnabled) {
    scene.background = null;
    return;
  }
  if (envSource) {
    scene.background = envSource;
  } else if (currentEnvTexture) {
    // Already a PMREM, can't use as direct background; just leave a solid colour
    scene.background = new THREE.Color(0x303030);
  }
}

// ---------- Helpers ----------
function frameObject() {
  if (!currentObject) return;
  const box = new THREE.Box3().setFromObject(currentObject);
  if (box.isEmpty()) return;
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * Math.PI / 180;
  let dist = maxDim / (2 * Math.tan(fov / 2));
  dist *= 1.6;
  const dirVec = new THREE.Vector3(1, 0.6, 1).normalize();
  camera.position.copy(center).add(dirVec.multiplyScalar(dist));
  camera.near = Math.max(maxDim / 1000, 0.001);
  camera.far  = Math.max(maxDim * 100, 100);
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.update();
  // Resize grid to fit
  const gridSize = Math.max(2, Math.ceil(maxDim * 2));
  grid.scale.setScalar(gridSize / 10);
}

function applyWireframe(on) {
  if (!currentObject) return;
  currentObject.traverse(o => {
    if (o.isMesh && o.material) {
      if (Array.isArray(o.material)) o.material.forEach(m => m.wireframe = on);
      else o.material.wireframe = on;
    }
  });
}

function updateInfo(name, obj) {
  let tris = 0, verts = 0, meshes = 0;
  obj.traverse(o => {
    if (o.isMesh && o.geometry) {
      meshes++;
      const g = o.geometry;
      verts += (g.attributes.position?.count) || 0;
      if (g.index) tris += g.index.count / 3;
      else tris += (g.attributes.position?.count || 0) / 3;
    }
  });
  document.getElementById('info-name').innerHTML = `<strong>${name}</strong>`;
  document.getElementById('info-stats').textContent =
    `${meshes.toLocaleString()} mesh${meshes===1?'':'es'} · ${Math.round(tris).toLocaleString()} triangles · ${verts.toLocaleString()} vertices`;
}

controls.autoRotateSpeed = 1.5;

const toneMap = {
  'ACESFilmic': THREE.ACESFilmicToneMapping,
  'Neutral':    THREE.NeutralToneMapping,
  'Reinhard':   THREE.ReinhardToneMapping,

};
document.getElementById('tone-mapping').addEventListener('change', (e) => {
  renderer.toneMapping = toneMap[e.target.value] ?? THREE.ACESFilmicToneMapping;
  if (currentObject) currentObject.traverse(o => {
    if (o.isMesh && o.material) {

      else o.material.needsUpdate = true;

});

document.getElementById('btn-frame').addEventListener('click', frameObject);
document.getElementById('btn-reset-cam').addEventListener('click', () => {

  controls.update();

// Phase 6: wire each persisted control to also capture-to-state on change.
// These listeners are ADDITIVE; they run alongside the existing handlers above.
for (const [id] of PERSISTED_CONTROLS) {
  const el = document.getElementById(id);
  if (!el) continue;
  const evt = (el.tagName === 'SELECT' || el.type === 'checkbox') ? 'change' : 'input';
  el.addEventListener(evt, () => captureSetting(id));
}

document.getElementById('btn-screenshot').addEventListener('click', () => {
  renderer.render(scene, camera); // ensure fresh frame
  const data = renderer.domElement.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = data;
  const name = currentObject ? (document.getElementById('info-name').textContent || 'render') : 'render';
  a.download = `${name.replace(/\.[^.]+$/, '')}-${Date.now()}.png`;
  a.click();
});

// ---------- Drag-and-drop ----------
const overlay = document.getElementById('drop-overlay');
let dragCount = 0;
window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCount++;
  overlay.classList.add('active');
});
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('dragleave', () => {
  dragCount--;
  if (dragCount <= 0) { dragCount = 0; overlay.classList.remove('active'); }
});
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCount = 0;
  overlay.classList.remove('active');
  // In Tauri the OS-drop listener handles drops with path info — skip the
  // browser path (which would lose the disk path and miss Recent-files tracking).
  if (tauriInvoke()) return;
  if (!e.dataTransfer.files.length) return;
  for (const f of e.dataTransfer.files) loadFile(f);
});

// ---------- Resize & animate ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

$fn = 64;
h_total      = 110;
r_bot        = 50;
r_top        = 28;
wall         = 1.6;
n_around     = 20;     // holes around circumference
n_vertical   = 6;      // rows of holes
hole_d       = 4;

difference() {
    // Cone shell
    difference() {
        cylinder(h = h_total, r1 = r_bot, r2 = r_top);
        translate([0, 0, -1])
            cylinder(h = h_total + 2, r1 = r_bot - wall, r2 = r_top - wall);
    }
    // Cutouts arranged in a diamond grid
    for (row = [0 : n_vertical - 1])
        for (i = [0 : n_around - 1])
            rotate([0, 0, i * 360/n_around + (row % 2) * 180/n_around])
                translate([r_bot, 0, (row + 0.5) * h_total/n_vertical])
                    rotate([0, 90, 0])
                        cylinder(h = wall * 4, d = hole_d, center = true);
}
`,
  honeycomb: `// Honeycomb panel — hexagonal lattice
size      = 70;    // overall panel side
thickness = 4;
cell_r    = 4.5;   // hexagon circumradius
wall_t    = 0.9;   // wall between cells

sx = 2 * cell_r * cos(30) + wall_t;
sy = 1.5 * cell_r + wall_t;
n  = 12;

difference() {
    cube([size, size, thickness], center = true);
    union() {
        // Even rows
        for (j = [-n : 2 : n], i = [-n : n])
            translate([i*sx, j*sy, 0])
                cylinder(h = thickness + 1, r = cell_r, center = true, $fn = 6);
        // Odd rows, offset by sx/2 for the hex packing
        for (j = [-n + 1 : 2 : n], i = [-n : n])
            translate([i*sx + sx/2, j*sy, 0])
                cylinder(h = thickness + 1, r = cell_r, center = true, $fn = 6);
    }
}
`
};

const CLAUDE_PROMPT_TEMPLATE = `Write OpenSCAD code for: \${DESCRIPTION}

Requirements:
- Output ONLY OpenSCAD code. No markdown fences, no explanation, no preamble.
- Set \\\`$fn = 64\\\` (or higher) for smooth curves.
- Center the model at origin where reasonable.
- Use millimeters as units.
- Keep total code under 120 lines.
- Use only stable OpenSCAD primitives (cube, cylinder, sphere, polygon, linear_extrude, rotate_extrude, hull, minkowski, difference, union, intersection, translate, rotate, scale, mirror, for, if, module, function).
- Do not use the text() primitive (fonts not available in our WASM build).
- Do not depend on external libraries (no use<>, no include<>).
- Add brief comments for any non-obvious parameter or math.

Target renderer: OpenSCAD-WASM 2022.03.20 (browser).
`;

const scadEditor   = document.getElementById('scad-editor');
const scadPrompt   = document.getElementById('scad-prompt');
const scadStatus   = document.getElementById('scad-status');
const scadTemplate = document.getElementById('scad-template');
const genModal     = document.getElementById('gen-modal');

function setScadStatus(msg, kind) {
  scadStatus.textContent = msg;
  scadStatus.className = '';
  if (kind) scadStatus.classList.add(kind);
}

scadTemplate.addEventListener('change', (e) => {
  scadEditor.value = SCAD_TEMPLATES[e.target.value] ?? SCAD_TEMPLATES.blank;
  setScadStatus(`Loaded template: ${e.target.value}`, 'ok');
});
// Default to cube on first open
scadEditor.value = SCAD_TEMPLATES.cube;

document.getElementById('btn-generate').addEventListener('click', () => {
  genModal.classList.add('active');
});
document.getElementById('gen-close').addEventListener('click', () => {
  genModal.classList.remove('active');
});
genModal.addEventListener('click', (e) => {
  if (e.target === genModal) genModal.classList.remove('active');
});

// ---- OpenSCAD-WASM lazy loader ----
let openscadInstance = null;
const openscadLog = [];

async function getOpenSCAD() {
  if (openscadInstance) return openscadInstance;
  setScadStatus('Loading OpenSCAD-WASM (one-time, ~7.5 MB)...', '');
  let OpenSCAD;
  try {
    OpenSCAD = (await import('./vendor/openscad-wasm/openscad.js')).default;
  } catch (e) {
    throw new Error(
      'Could not load vendor/openscad-wasm/openscad.js.\n' +
      'Did you run setup.ps1 in the project folder? It downloads the WASM.\n\n' +
      `Underlying error: ${e.message || e}`
    );
  }
  openscadInstance = await OpenSCAD({
    noInitialRun: true,
    print:    (s) => openscadLog.push(s),
    printErr: (s) => openscadLog.push(s)
  });
  return openscadInstance;
}

async function renderScad(code) {
  const inst = await getOpenSCAD();
  openscadLog.length = 0;
  // Write input to virtual FS
  try { inst.FS.unlink('/input.scad'); } catch(_) {}
  try { inst.FS.unlink('/out.stl'); } catch(_) {}
  inst.FS.writeFile('/input.scad', code);

  let exitCode = 0;
  try {
    inst.callMain(['/input.scad', '-o', '/out.stl']);
  } catch (e) {
    // Emscripten throws ExitStatus when main returns non-zero
    exitCode = e.status ?? -1;
  }

  let data;
  try { data = inst.FS.readFile('/out.stl'); }
  catch (_) { data = null; }

  if (!data || data.length < 84) {
    const stderr = openscadLog.join('\n').trim() || '(no diagnostic output)';
    throw new Error(`OpenSCAD failed${exitCode ? ' (exit '+exitCode+')' : ''}:\n${stderr}`);
  }
  return { stl: data, log: openscadLog.join('\n') };
}

document.getElementById('scad-render').addEventListener('click', async () => {
  const code = scadEditor.value.trim();
  if (!code) { setScadStatus('Editor is empty.', 'err'); return; }
  setScadStatus('Rendering...', '');
  busy('Running OpenSCAD-WASM...');
  try {
    const t0 = performance.now();
    const { stl, log } = await renderScad(code);
    const ms = (performance.now() - t0).toFixed(0);

    // Load STL into Three
    const geo = stlLoader.parse(stl.buffer.slice(stl.byteOffset, stl.byteOffset + stl.byteLength));
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.45, metalness: 0.1 });
    const mesh = new THREE.Mesh(geo, mat);
    const group = new THREE.Group();
    group.add(mesh);
    setObject(group, `generated_${scadTemplate.value}.stl`);

    setScadStatus(`Rendered in ${ms} ms${log ? '\n' + log : ''}`, 'ok');
    genModal.classList.remove('active');
  } catch (err) {
    console.error(err);
    setScadStatus(String(err.message || err), 'err');
  } finally {
    unbusy();
  }
});

document.getElementById('scad-copy-prompt').addEventListener('click', async () => {
  const desc = scadPrompt.value.trim() || '[describe the object you want — be specific about dimensions in mm]';
  const prompt = CLAUDE_PROMPT_TEMPLATE.replace('${DESCRIPTION}', desc);
  try {
    await navigator.clipboard.writeText(prompt);
    setScadStatus('Claude prompt copied to clipboard. Paste it into a Claude chat, then paste the response back into the editor above.', 'ok');
  } catch (e) {
    setScadStatus('Clipboard blocked. Here is the prompt:\n\n' + prompt, '');
  }
});

document.getElementById('scad-save').addEventListener('click', () => {
  const code = scadEditor.value;
  const blob = new Blob([code], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${scadTemplate.value || 'sketch'}_${Date.now()}.scad`;
  a.click();
});

// =====================================================================
// Phase 5.1: Open initial file from Tauri argv (file association launches)
// =====================================================================
async function openTauriInitialFile() {
  const invoke = tauriInvoke();
  if (!invoke) return; // running in plain browser; nothing to do

  let path = null;
  try {
    path = await invoke('get_initial_file');
  } catch (e) {
    console.warn('get_initial_file failed:', e);
    return;
  }
  if (!path) return;

  const filename = path.split(/[\\/]/).pop();
  busy(`Opening ${filename}...`);
  try {
    // read_file_bytes returns raw bytes via tauri::ipc::Response → ArrayBuffer in JS
    const bytes = await invoke('read_file_bytes', { path });
    const blob  = new Blob([bytes]);
    const file  = new File([blob], filename);
    loadFile(file);
    addRecent(path, filename);
  } catch (e) {
    console.error('Failed to open file passed on command line:', e);
    alert(`Couldn't open ${filename}\n\n${e.message || e}`);
    unbusy();
  }
}

// =====================================================================
// Init sequence
// =====================================================================
(async () => {
  // 1. Read persisted state (no-op in plain browser)
  await loadAppState();

  // 2. Render the recent files list (header stays hidden if list is empty)
  renderRecents();

  // 3. Apply saved settings to the UI. Each control's change/input event
  //    fires, which makes the existing handlers actually push the value
  //    into the renderer.
  applyPersistedSettings();

  // 4. If env preset wasn't persisted, fall back to studio default.
  if (!appState.settings || !appState.settings['env-preset']) {
    setProceduralEnvironment('studio');
  }

  // 5. Start render loop
  animate();

  // 6. Wire path-aware drag-drop + file-open-via-argv in Tauri
  setupOsDropListener();
  openTauriInitialFile();
})();
</script>
